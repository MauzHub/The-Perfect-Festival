<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Perfect Festival">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d78"/>
      <stop offset=".55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#13d4c4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset=".5" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#e0a51c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0" stop-color="#1a1030"/>
      <stop offset="1" stop-color="#0a0a12"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- badge body -->
  <circle cx="256" cy="256" r="232" fill="url(#glow)" stroke="url(#neon)" stroke-width="14"/>
  <circle cx="256" cy="256" r="206" fill="none" stroke="url(#gold)" stroke-width="3" stroke-opacity=".7"/>

  <!-- stage light beams -->
  <g opacity=".5" filter="url(#soft)">
    <path d="M256 70 L150 250 L210 250 Z" fill="#ff2d78" opacity=".35"/>
    <path d="M256 70 L362 250 L302 250 Z" fill="#13d4c4" opacity=".35"/>
  </g>

  <!-- equalizer bars (the "music") -->
  <g fill="url(#neon)" filter="url(#soft)">
    <rect x="150" y="232" width="22" height="70"  rx="6"/>
    <rect x="186" y="196" width="22" height="106" rx="6"/>
    <rect x="222" y="156" width="22" height="146" rx="6"/>
    <rect x="268" y="178" width="22" height="124" rx="6"/>
    <rect x="304" y="150" width="22" height="152" rx="6"/>
    <rect x="340" y="210" width="22" height="92"  rx="6"/>
  </g>

  <!-- stage floor -->
  <rect x="138" y="300" width="236" height="10" rx="5" fill="url(#gold)" opacity=".85"/>

  <!-- perfect-record motif -->
  <text x="256" y="372" text-anchor="middle" font-family="'Bebas Neue',Inter,sans-serif"
        font-size="74" font-weight="700" letter-spacing="6" fill="url(#gold)">38·0·0</text>
  <text x="256" y="414" text-anchor="middle" font-family="Inter,sans-serif"
        font-size="26" font-weight="800" letter-spacing="7" fill="#e9e9f2" opacity=".82">SOLD OUT</text>
</svg>
